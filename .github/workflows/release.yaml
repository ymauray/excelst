name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: excelst-linux-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            archive: excelst-win-x64.zip
          - os: macos-latest
            rid: osx-arm64
            archive: excelst-osx-arm64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish src/excelst/excelst.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o out

      - name: Archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} -C out excelst

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path out\excelst.exe -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Install nfpm
        if: runner.os == 'Linux'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm

      - name: Package (.deb / .rpm)
        if: runner.os == 'Linux'
        run: |
          VERSION=${GITHUB_REF_NAME#v} nfpm package --config nfpm.yaml --packager deb --target excelst-linux-x64.deb
          VERSION=${GITHUB_REF_NAME#v} nfpm package --config nfpm.yaml --packager rpm --target excelst-linux-x64.rpm

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: excelst-linux-x64.deb
          path: excelst-linux-x64.deb

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: excelst-linux-x64.rpm
          path: excelst-linux-x64.rpm

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
