name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: excelst-linux-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            archive: excelst-win-x64.zip
          - os: macos-latest
            rid: osx-arm64
            archive: excelst-osx-arm64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish src/excelst/excelst.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o out

      - name: Archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} -C out excelst

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path out\excelst.exe -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Install nfpm
        if: runner.os == 'Linux'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm

      - name: Package (.deb / .rpm)
        if: runner.os == 'Linux'
        run: |
          VERSION=${GITHUB_REF_NAME#v} nfpm package --config nfpm.yaml --packager deb --target excelst-linux-x64.deb
          VERSION=${GITHUB_REF_NAME#v} nfpm package --config nfpm.yaml --packager rpm --target excelst-linux-x64.rpm

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: excelst-linux-x64.deb
          path: excelst-linux-x64.deb

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: excelst-linux-x64.rpm
          path: excelst-linux-x64.rpm

      - name: Build AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p excelst.AppDir/usr/bin
          cp out/excelst excelst.AppDir/usr/bin/

          printf '#!/bin/bash\nexec "$APPDIR/usr/bin/excelst" "$@"\n' > excelst.AppDir/AppRun
          chmod +x excelst.AppDir/AppRun

          printf '[Desktop Entry]\nName=excelst\nExec=excelst\nIcon=excelst\nType=Application\nCategories=Utility;\n' \
            > excelst.AppDir/excelst.desktop

          python3 -c "
          import zlib, struct
          w, h = 64, 64
          raw = b''.join(b'\x00' + bytes([33, 150, 243] * w) for _ in range(h))
          def chunk(t, d):
              c = zlib.crc32(t+d) & 0xffffffff
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
          png = (b'\x89PNG\r\n\x1a\n'
              + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              + chunk(b'IDAT', zlib.compress(raw))
              + chunk(b'IEND', b''))
          open('excelst.AppDir/excelst.png', 'wb').write(png)
          "

          curl -Lo appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run excelst.AppDir excelst-linux-x64.AppImage

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: excelst-linux-x64.AppImage
          path: excelst-linux-x64.AppImage

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION=${VERSION#v}
          MACOS_SHA=$(curl -sL "https://github.com/ymauray/excelst/releases/download/${{ github.ref_name }}/excelst-osx-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
          LINUX_SHA=$(curl -sL "https://github.com/ymauray/excelst/releases/download/${{ github.ref_name }}/excelst-linux-x64.tar.gz" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ymauray/homebrew-tap.git" tap
          cd tap

          VERSION=$VERSION MACOS_SHA=$MACOS_SHA LINUX_SHA=$LINUX_SHA python3 << 'PYEOF'
          import re, os
          content = open('Formula/excelst.rb').read()
          content = re.sub(r'version "[^"]*"', f'version "{os.environ["VERSION"]}"', content)
          shas = iter([os.environ['MACOS_SHA'], os.environ['LINUX_SHA']])
          content = re.sub(r'sha256 "[a-f0-9]*"', lambda m: f'sha256 "{next(shas)}"', content)
          open('Formula/excelst.rb', 'w').write(content)
          PYEOF

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/excelst.rb
          git diff --staged --quiet || git commit -m "bump excelst to ${VERSION}"
          git push
